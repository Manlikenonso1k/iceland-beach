name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_BASE64 }}
          key_base64: true
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.HOSTINGER_SSH_DEPLOY_PATH }}"

            # 1. Setup SSH Agent using key already on server
            eval $(ssh-agent -s)
            ssh-add ~/.ssh/id_ed25519 2>/dev/null || ssh-add ~/.ssh/id_rsa 2>/dev/null || true

            # 2. Configure GitHub SSH
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            # 3. Sync files with GitHub using SSH
            git remote set-url origin git@github.com:${{ github.repository }}.git
            git fetch origin main
            git reset --hard origin/main